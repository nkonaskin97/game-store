<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - GAMER.STORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <link rel="icon" type="image/png" href="favicon.png">
<div class="site-wrapper">
    <header class="header">
        <div class="container header-container">
            <div class="logo"><a href="index.html">GAMER.STORE</a></div>
            <div class="search">
                <input type="text" placeholder="Поиск игр...">
                <button>🔍</button>
            </div>
        </div>
        <nav class="nav">
            <div class="container nav-container">
                <a href="index.html" class="nav-link">Магазин</a>
                <a href="about.html" class="nav-link">О нас</a>
                <a href="howto.html" class="nav-link">Как купить</a>
                <a href="payment.html" class="nav-link">Оплата</a>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="auth-container">
            <h1>Вход</h1>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <form id="loginForm" class="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit" class="auth-submit">Войти</button>
            </form>
            <div class="auth-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© GAMER.STORE — Цифровая дистрибуция игр</p>
        </div>
    </footer>
</div>

<script src="script.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        const result = Auth.login(email, password);

        if (result.success) {
            window.location.href = 'index.html';
        } else {
            errorDiv.textContent = result.error;
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
