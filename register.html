<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - GAMER.STORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <link rel="icon" type="image/png" href="favicon.png">
<div class="site-wrapper">
    <header class="header">
        <div class="container header-container">
            <div class="logo"><a href="index.html">GAMER.STORE</a></div>
            <div class="search">
                <input type="text" placeholder="Поиск игр...">
                <button>🔍</button>
            </div>
        </div>
        <nav class="nav">
            <div class="container nav-container">
                <a href="index.html" class="nav-link">Магазин</a>
                <a href="about.html" class="nav-link">О нас</a>
                <a href="howto.html" class="nav-link">Как купить</a>
                <a href="payment.html" class="nav-link">Оплата</a>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="auth-container">
            <h1>Регистрация</h1>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <div id="successMsg" class="success-msg" style="display: none;"></div>
            <form id="registerForm" class="auth-form">
                <input type="text" id="username" placeholder="Имя пользователя" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Пароль" required>
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
                <button type="submit" class="auth-submit">Создать аккаунт</button>
            </form>
            <div class="auth-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© GAMER.STORE — Цифровая дистрибуция игр</p>
        </div>
    </footer>
</div>

<script src="script.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (password !== confirm) {
            errorDiv.textContent = 'Пароли не совпадают';
            errorDiv.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorDiv.textContent = 'Пароль должен содержать минимум 6 символов';
            errorDiv.style.display = 'block';
            return;
        }

        const result = Auth.register(username, email, password);

        if (result.success) {
            successDiv.textContent = 'Регистрация успешна! Перенаправление на страницу входа...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            errorDiv.textContent = result.error;
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
